<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Team Task Manager</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .card {
        transition: 0.3s;
      }

      .card:hover {
        transform: scale(1.02);
      }
    </style>
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
      <a class="navbar-brand" href="/dashboard/"> Team Task Manager </a>

      <div class="ms-auto">
        <a href="/project/" class="btn btn-success btn-sm"> New Project </a>

        <a href="/task/" class="btn btn-primary btn-sm"> New Task </a>

        <a href="/logout/" class="btn btn-danger btn-sm"> Logout </a>
      </div>
    </nav>

    <div class="container mt-4">{% block content %} {% endblock %}</div>
    <footer class="text-center mt-5 mb-3 text-muted">
      <hr />

      <p>Team Task Manager | Built with Django & Bootstrap</p>
    </footer>
  </body>
</html>
